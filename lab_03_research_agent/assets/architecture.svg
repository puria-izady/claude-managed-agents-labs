<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Lab 3 — Research agent with Google Docs MCP</title><desc id="desc">A user message enters a Managed Agent session. The session contains the Research Brief agent and its cloud environment. Agent tools include web tools and a permissioned Google Docs MCP toolset. The session supplies a Google Docs vault, and the environment owns networking.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#4f7cff"/></marker>
    <symbol id="msg" viewBox="0 0 24 24"><path d="M22 17a2 2 0 0 1-2 2H7l-5 3V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"/></symbol>
    <symbol id="bot" viewBox="0 0 24 24"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2m16 0h2M9 13v2m6-2v2"/></symbol>
    <symbol id="cloud" viewBox="0 0 24 24"><path d="M17.5 19H9a7 7 0 1 1 6.7-9h1.8a4.5 4.5 0 1 1 0 9Z"/></symbol>
    <symbol id="tool" viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5-5L7.5 3.5l3 3-4 4-3-3-2.2 2.2a4 4 0 0 0 5 5L16 24l8-8-9.3-9.7Z"/></symbol>
    <symbol id="shield" viewBox="0 0 24 24"><path d="M20 13c0 5-3.5 7.5-8 9-4.5-1.5-8-4-8-9V5l8-3 8 3z"/><path d="m9 12 2 2 4-4"/></symbol>
    <symbol id="network" viewBox="0 0 24 24"><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3h14v3M12 8v5"/></symbol>
    <symbol id="plug" viewBox="0 0 24 24"><path d="M12 22v-5M15 8V2M9 8V2"/><path d="M7 8h10a1 1 0 0 1 1 1v4a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1Z"/></symbol>
    <symbol id="key" viewBox="0 0 24 24"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6M15 8l3 3m-6-6 3 3"/></symbol>
    <symbol id="safe" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M12 9V7m3 5h2m-5 3v2m-3-5H7"/></symbol>
    <symbol id="file" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6M8 13h8m-8 4h8"/></symbol>
  </defs>
  <style>.bg{fill:#f7f9fc}.session{fill:#fbfdff;stroke:#4f7cff;stroke-width:2.5}.panel{fill:#fff;stroke:#d6e1ec;stroke-width:2}.agent{fill:#eef4ff;stroke:#7aa0ff;stroke-width:2}.sub{fill:#fff;stroke:#bfd0e3;stroke-width:1.7}.accent{fill:#eef4ff;stroke:#4f7cff;stroke-width:2}.line{fill:none;stroke:#4f7cff;stroke-width:2.3;marker-end:url(#arrow)}.dash{fill:none;stroke:#7d91a6;stroke-width:2;stroke-dasharray:6 6}.h{font:700 25px system-ui,sans-serif;fill:#17324d}.k{font:700 12px system-ui,sans-serif;letter-spacing:.09em;fill:#60758a}.l{font:650 17px system-ui,sans-serif;fill:#17324d}.n{font:14px system-ui,sans-serif;fill:#60758a}.s{font:13px system-ui,sans-serif;fill:#60758a}.icon{fill:none;stroke:#4f7cff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}</style>
  <rect class="bg" x="4" y="4" width="1392" height="752" rx="28"/><text class="h" x="42" y="52">Research agent with Google Docs delivery</text>
  <rect class="panel" x="40" y="130" width="200" height="108" rx="18"/><use href="#msg" class="icon" x="58" y="150" width="24" height="24"/><text class="k" x="94" y="166">USER PROMPT</text><text class="l" x="58" y="204">Research topic</text><path class="line" d="M240 184H278"/>
  <rect class="session" x="278" y="88" width="858" height="610" rx="28"/><text class="k" x="310" y="122">MANAGED AGENT SESSION</text>
  <rect class="agent" x="310" y="170" width="426" height="484" rx="22"/><use href="#bot" class="icon" x="332" y="192" width="27" height="27"/><text class="k" x="371" y="209">AGENT</text><text class="l" x="332" y="244">Research Brief</text><text class="n" x="332" y="267">Claude Haiku · system instructions</text>
  <rect class="sub" x="332" y="292" width="382" height="72" rx="16"/><use href="#tool" class="icon" x="350" y="317" width="22" height="22"/><text class="k" x="382" y="333">BUILT-IN AGENT TOOLSET</text>
  <rect class="sub" x="332" y="438" width="382" height="174" rx="16"/><use href="#plug" class="icon" x="350" y="457" width="22" height="22"/><text class="k" x="382" y="473">MCP TOOLSET · GOOGLE_DOCS</text><text class="l" x="350" y="506">Google Docs tools</text><rect class="accent" x="350" y="530" width="346" height="58" rx="12"/><use href="#shield" class="icon" x="366" y="547" width="20" height="20"/><text class="k" x="398" y="553">TOOL PERMISSION</text><text class="n" x="398" y="575">always_allow</text>
  <rect class="panel" x="766" y="170" width="338" height="264" rx="22"/><use href="#cloud" class="icon" x="788" y="192" width="25" height="25"/><text class="k" x="825" y="208">ENVIRONMENT</text><text class="l" x="788" y="244">Cloud runtime</text><rect class="sub" x="788" y="270" width="294" height="132" rx="15"/><use href="#network" class="icon" x="806" y="289" width="22" height="22"/><text class="k" x="838" y="305">NETWORK PERMISSIONS</text><text class="l" x="806" y="340">Limited networking</text><text class="n" x="806" y="366">MCP servers allowed</text><text class="n" x="806" y="389">public research hosts allowed</text><path class="dash" d="M736 315H766"/>
  <rect class="panel" x="766" y="458" width="338" height="112" rx="20"/><use href="#safe" class="icon" x="788" y="479" width="23" height="23"/><text class="k" x="823" y="496">SESSION VAULT ID</text><text class="l" x="788" y="532">Google Docs credential</text>
  <rect class="panel" x="1170" y="184" width="194" height="112" rx="18"/><use href="#plug" class="icon" x="1189" y="203" width="24" height="24"/><text class="k" x="1224" y="220">MCP SERVER</text><text class="l" x="1189" y="256">Google Docs</text><text class="n" x="1189" y="280">vault-backed OAuth</text><path class="line" d="M714 525H751V675H1267V306"/>
  <rect class="panel" x="40" y="382" width="200" height="122" rx="18"/><use href="#file" class="icon" x="59" y="401" width="24" height="24"/><text class="k" x="94" y="418">RESULT</text><text class="l" x="59" y="454">Google Doc</text><text class="n" x="59" y="480">cited brief + URL</text><path class="line" d="M278 444H250"/>
</svg>
