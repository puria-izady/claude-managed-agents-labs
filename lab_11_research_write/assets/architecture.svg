<svg xmlns="http://www.w3.org/2000/svg" width="1580" height="880" viewBox="0 0 1580 880" role="img" aria-labelledby="title desc">
  <title id="title">Lab 11 — Multi-agent research pipeline</title><desc id="desc">A user topic enters a session that runs a Research Lead coordinator and a cloud environment. The coordinator agent owns a built-in toolset and a three-agent roster. Each specialist owns its own scoped tools. Child threads share the environment filesystem and return results to the coordinator.</desc>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#4f7cff"/></marker><symbol id="msg" viewBox="0 0 24 24"><path d="M22 17a2 2 0 0 1-2 2H7l-5 3V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"/></symbol><symbol id="bot" viewBox="0 0 24 24"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2m16 0h2M9 13v2m6-2v2"/></symbol><symbol id="users" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.9M16 3.1a4 4 0 0 1 0 7.8"/></symbol><symbol id="cloud" viewBox="0 0 24 24"><path d="M17.5 19H9a7 7 0 1 1 6.7-9h1.8a4.5 4.5 0 1 1 0 9Z"/></symbol><symbol id="tool" viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5-5L7.5 3.5l3 3-4 4-3-3-2.2 2.2a4 4 0 0 0 5 5L16 24l8-8-9.3-9.7Z"/></symbol><symbol id="network" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></symbol><symbol id="file" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6M8 13h8m-8 4h8"/></symbol></defs>
  <style>.bg{fill:#f7f9fc}.session{fill:#fbfdff;stroke:#4f7cff;stroke-width:2.5}.panel{fill:#fff;stroke:#d6e1ec;stroke-width:2}.agent{fill:#eef4ff;stroke:#7aa0ff;stroke-width:2}.sub{fill:#fff;stroke:#bfd0e3;stroke-width:1.7}.role{fill:#f8fbff;stroke:#9db8d6;stroke-width:1.7}.line{fill:none;stroke:#4f7cff;stroke-width:2.3;marker-end:url(#a)}.dash{fill:none;stroke:#7d91a6;stroke-width:2;stroke-dasharray:6 6}.h{font:700 25px system-ui,sans-serif;fill:#17324d}.k{font:700 12px system-ui,sans-serif;letter-spacing:.09em;fill:#60758a}.l{font:650 17px system-ui,sans-serif;fill:#17324d}.n{font:14px system-ui,sans-serif;fill:#60758a}.s{font:13px system-ui,sans-serif;fill:#60758a}.icon{fill:none;stroke:#4f7cff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}</style>
  <rect class="bg" x="4" y="4" width="1572" height="872" rx="28"/><text class="h" x="42" y="52">Research, write, and fact-check with a coordinator agent</text>
  <rect class="panel" x="40" y="126" width="200" height="124" rx="18"/><use href="#msg" class="icon" x="58" y="147" width="24" height="24"/><text class="k" x="94" y="163">USER PROMPT</text><text class="l" x="58" y="201">Research topic</text><text class="n" x="58" y="228">produce verified brief</text><path class="line" d="M240 188H278"/>
  <rect class="session" x="278" y="88" width="1060" height="736" rx="28"/><text class="k" x="310" y="122">MANAGED AGENT SESSION</text><text class="n" x="310" y="146">coordinator primary thread + specialist child threads + shared environment filesystem</text>
  <rect class="agent" x="310" y="170" width="672" height="608" rx="22"/><use href="#bot" class="icon" x="332" y="192" width="27" height="27"/><text class="k" x="371" y="209">COORDINATOR AGENT</text><text class="l" x="332" y="245">Research Lead</text><text class="n" x="332" y="270">delegates, checks handoffs, saves final brief</text><rect class="sub" x="332" y="294" width="628" height="62" rx="14"/><use href="#tool" class="icon" x="350" y="313" width="21" height="21"/><text class="k" x="382" y="329">BUILT-IN AGENT TOOLSET</text>
  <rect class="sub" x="332" y="390" width="628" height="350" rx="16"/><use href="#users" class="icon" x="350" y="409" width="23" height="23"/><text class="k" x="385" y="426">MULTIAGENT ROSTER · SPECIALIST AGENTS</text>
  <rect class="role" x="350" y="452" width="186" height="250" rx="14"/><use href="#bot" class="icon" x="366" y="469" width="20" height="20"/><text class="l" x="366" y="519">Researcher</text><text class="s" x="366" y="546">scoped tools:</text><text class="n" x="366" y="574">web_search</text><text class="n" x="366" y="598">web_fetch</text><text class="n" x="366" y="622">read · write</text><text class="s" x="366" y="666">→ citations.json</text>
  <rect class="role" x="553" y="452" width="186" height="250" rx="14"/><use href="#bot" class="icon" x="569" y="469" width="20" height="20"/><text class="l" x="569" y="519">Writer</text><text class="s" x="569" y="554">Built-In Agent Toolset</text><text class="s" x="569" y="666">→ draft.md</text>
  <rect class="role" x="756" y="452" width="186" height="250" rx="14"/><use href="#bot" class="icon" x="772" y="469" width="20" height="20"/><text class="l" x="772" y="519">Fact-Checker</text><text class="s" x="772" y="546">scoped tools:</text><text class="n" x="772" y="574">web_fetch</text><text class="n" x="772" y="598">read · write</text><text class="s" x="772" y="666">→ check.md</text>
  <rect class="panel" x="1012" y="170" width="294" height="330" rx="22"/><use href="#cloud" class="icon" x="1034" y="192" width="25" height="25"/><text class="k" x="1071" y="208">ENVIRONMENT</text><text class="l" x="1034" y="245">Shared cloud runtime</text><rect class="sub" x="1034" y="278" width="250" height="112" rx="15"/><use href="#network" class="icon" x="1052" y="297" width="21" height="21"/><text class="k" x="1084" y="313">NETWORK PERMISSIONS</text><text class="l" x="1052" y="349">unrestricted</text><text class="n" x="1052" y="376">web tools reach sources</text><text class="n" x="1034" y="430">Shared /workspace handoffs:</text><text class="s" x="1034" y="455">citations.json · draft.md · check.md</text><path class="dash" d="M982 334H1012"/>
  <rect class="panel" x="1012" y="530" width="294" height="168" rx="20"/><text class="k" x="1034" y="558">SESSION THREADS</text><text class="l" x="1034" y="594">Primary coordinator thread</text><text class="n" x="1034" y="622">3 specialist child threads</text><text class="n" x="1034" y="650">results return to coordinator</text>
  <rect class="panel" x="1370" y="346" width="174" height="142" rx="18"/><use href="#file" class="icon" x="1389" y="367" width="24" height="24"/><text class="k" x="1424" y="384">RESULT</text><text class="l" x="1389" y="424">brief.md</text><text class="n" x="1389" y="452">Files API download</text><path class="line" d="M1338 417H1370"/>
</svg>
