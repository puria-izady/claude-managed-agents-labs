<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="820" viewBox="0 0 1480 820" role="img" aria-labelledby="title desc">
  <title id="title">Lab 10 — Customer support with persistent memory</title><desc id="desc">Two separate Managed Agent sessions reuse the same Support Agent and environment. Each session attaches a read-write customer memory store and a read-only policy memory store so context can be reused across calls.</desc>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#4f7cff"/></marker><symbol id="msg" viewBox="0 0 24 24"><path d="M22 17a2 2 0 0 1-2 2H7l-5 3V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"/></symbol><symbol id="bot" viewBox="0 0 24 24"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2m16 0h2M9 13v2m6-2v2"/></symbol><symbol id="cloud" viewBox="0 0 24 24"><path d="M17.5 19H9a7 7 0 1 1 6.7-9h1.8a4.5 4.5 0 1 1 0 9Z"/></symbol><symbol id="tool" viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5-5L7.5 3.5l3 3-4 4-3-3-2.2 2.2a4 4 0 0 0 5 5L16 24l8-8-9.3-9.7Z"/></symbol><symbol id="network" viewBox="0 0 24 24"><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3h14v3M12 8v5"/></symbol><symbol id="db" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.7 4 3 9 3s9-1.3 9-3V5M3 12c0 1.7 4 3 9 3s9-1.3 9-3"/></symbol></defs>
  <style>.bg{fill:#f7f9fc}.session{fill:#fbfdff;stroke:#4f7cff;stroke-width:2.5}.panel{fill:#fff;stroke:#d6e1ec;stroke-width:2}.agent{fill:#eef4ff;stroke:#7aa0ff;stroke-width:2}.sub{fill:#fff;stroke:#bfd0e3;stroke-width:1.7}.rw{fill:#eef8f3;stroke:#78b89a;stroke-width:1.8}.ro{fill:#f5f2fb;stroke:#9b8bc4;stroke-width:1.8}.line{fill:none;stroke:#4f7cff;stroke-width:2.3;marker-end:url(#a)}.dash{fill:none;stroke:#7d91a6;stroke-width:2;stroke-dasharray:6 6}.h{font:700 25px system-ui,sans-serif;fill:#17324d}.k{font:700 12px system-ui,sans-serif;letter-spacing:.09em;fill:#60758a}.l{font:650 17px system-ui,sans-serif;fill:#17324d}.n{font:14px system-ui,sans-serif;fill:#60758a}.s{font:13px system-ui,sans-serif;fill:#60758a}.icon{fill:none;stroke:#4f7cff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}</style>
  <rect class="bg" x="4" y="4" width="1472" height="812" rx="28"/><text class="h" x="42" y="52">Customer support across separate sessions with persistent memory</text>
  <rect class="panel" x="40" y="130" width="200" height="168" rx="18"/><use href="#msg" class="icon" x="58" y="151" width="24" height="24"/><text class="k" x="94" y="167">USER PROMPTS</text><text class="l" x="58" y="206">Session 1: issue</text><text class="l" x="58" y="238">Session 2: recall</text><text class="n" x="58" y="269">separate calls</text><path class="line" d="M240 214H278"/>
  <rect class="session" x="278" y="88" width="858" height="682" rx="28"/><text class="k" x="310" y="122">TWO SEPARATE MANAGED AGENT SESSIONS</text><text class="n" x="310" y="146">same agent + same environment; memory stores carry state across sessions</text><rect class="sub" x="818" y="106" width="126" height="36" rx="18"/><text class="s" x="881" y="129" text-anchor="middle">Session 1</text><rect class="sub" x="958" y="106" width="126" height="36" rx="18"/><text class="s" x="1021" y="129" text-anchor="middle">Session 2</text>
  <rect class="agent" x="310" y="174" width="410" height="316" rx="22"/><use href="#bot" class="icon" x="332" y="196" width="27" height="27"/><text class="k" x="371" y="213">REUSED AGENT</text><text class="l" x="332" y="249">Support Agent</text><text class="n" x="332" y="274">reads profile + policy; appends call note</text><rect class="sub" x="332" y="302" width="366" height="72" rx="16"/><use href="#tool" class="icon" x="350" y="321" width="22" height="22"/><text class="k" x="382" y="337">BUILT-IN AGENT TOOLSET</text>
  <rect class="panel" x="752" y="174" width="352" height="316" rx="22"/><use href="#cloud" class="icon" x="774" y="196" width="25" height="25"/><text class="k" x="811" y="212">REUSED ENVIRONMENT</text><text class="l" x="774" y="249">Cloud runtime</text><rect class="sub" x="774" y="284" width="308" height="118" rx="15"/><use href="#network" class="icon" x="792" y="303" width="21" height="21"/><text class="k" x="824" y="319">NETWORK PERMISSIONS</text><text class="l" x="792" y="355">limited</text><text class="n" x="792" y="382">allowed_hosts: none</text><path class="dash" d="M720 332H752"/>
  <rect class="panel" x="310" y="520" width="794" height="204" rx="20"/><text class="k" x="332" y="549">SESSION RESOURCES · MEMORY STORE ATTACHMENTS</text><rect class="rw" x="332" y="570" width="350" height="126" rx="15"/><use href="#db" class="icon" x="350" y="590" width="22" height="22"/><text class="k" x="382" y="606">CUSTOMER MEMORY</text><text class="l" x="350" y="642">cust-alice · read_write</text><text class="n" x="350" y="670">profile + call history</text><rect class="ro" x="710" y="570" width="372" height="126" rx="15"/><use href="#db" class="icon" x="728" y="590" width="22" height="22"/><text class="k" x="760" y="606">SHARED POLICY MEMORY</text><text class="l" x="728" y="642">support-policies · read_only</text><text class="n" x="728" y="670">refund rules cannot be changed</text>
</svg>
