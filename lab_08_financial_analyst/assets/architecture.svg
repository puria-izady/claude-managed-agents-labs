  <rect class="panel" x="40" y="122" width="200" height="132" rx="18"/><use href="#msg" class="icon" x="58" y="143" width="24" height="24"/><text class="k" x="94" y="159">USER PROMPT</text><text class="l" x="58" y="197">Build workbook</text><text class="n" x="58" y="225">analysis + charts</text><path class="line" d="M240 188H278"/>
