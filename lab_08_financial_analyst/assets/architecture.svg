<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Lab 8 — Financial analyst with an XLSX skill</title><desc id="desc">The Financial Analyst agent owns a built-in toolset and Anthropic XLSX skill. The environment owns data-science packages and unrestricted networking. A CSV file is attached as a session resource and mounted in the workspace. The resulting workbook is downloaded through the Files API.</desc>
