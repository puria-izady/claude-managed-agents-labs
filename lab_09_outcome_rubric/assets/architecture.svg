<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Lab 9 — Outcome-driven action plan</title><desc id="desc">A user-defined outcome enters a session containing a Meeting Action Planner and an isolated cloud environment. Meeting notes are a file resource mounted on the session. The outcome event owns its rubric and iteration limit; the managed grader loops until satisfied or the limit is reached.</desc>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#4f7cff"/></marker><symbol id="msg" viewBox="0 0 24 24"><path d="M22 17a2 2 0 0 1-2 2H7l-5 3V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"/></symbol><symbol id="bot" viewBox="0 0 24 24"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2m16 0h2M9 13v2m6-2v2"/></symbol><symbol id="cloud" viewBox="0 0 24 24"><path d="M17.5 19H9a7 7 0 1 1 6.7-9h1.8a4.5 4.5 0 1 1 0 9Z"/></symbol><symbol id="tool" viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5-5L7.5 3.5l3 3-4 4-3-3-2.2 2.2a4 4 0 0 0 5 5L16 24l8-8-9.3-9.7Z"/></symbol><symbol id="network" viewBox="0 0 24 24"><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3h14v3M12 8v5"/></symbol><symbol id="file" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6M8 13h8m-8 4h8"/></symbol><symbol id="check" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></symbol></defs>
  <style>.bg{fill:#f7f9fc}.session{fill:#fbfdff;stroke:#4f7cff;stroke-width:2.5}.panel{fill:#fff;stroke:#d6e1ec;stroke-width:2}.agent{fill:#eef4ff;stroke:#7aa0ff;stroke-width:2}.sub{fill:#fff;stroke:#bfd0e3;stroke-width:1.7}.accent{fill:#eef4ff;stroke:#4f7cff;stroke-width:1.8}.line{fill:none;stroke:#4f7cff;stroke-width:2.3;marker-end:url(#a)}.loop{fill:none;stroke:#e0a43a;stroke-width:2.3;stroke-dasharray:7 5;marker-end:url(#a)}.dash{fill:none;stroke:#7d91a6;stroke-width:2;stroke-dasharray:6 6}.h{font:700 25px system-ui,sans-serif;fill:#17324d}.k{font:700 12px system-ui,sans-serif;letter-spacing:.09em;fill:#60758a}.l{font:650 17px system-ui,sans-serif;fill:#17324d}.n{font:14px system-ui,sans-serif;fill:#60758a}.icon{fill:none;stroke:#4f7cff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}</style>
  <rect class="bg" x="4" y="4" width="1392" height="772" rx="28"/><text class="h" x="42" y="52">Outcome-driven action plan with a managed grader</text>
  <rect class="panel" x="40" y="122" width="200" height="142" rx="18"/><use href="#msg" class="icon" x="58" y="143" width="24" height="24"/><text class="k" x="94" y="159">USER-DEFINED OUTCOME</text><text class="l" x="58" y="198">Create action plan</text><text class="n" x="58" y="226">user.define_outcome</text><path class="line" d="M240 193H278"/>
  <rect class="session" x="278" y="88" width="858" height="650" rx="28"/><text class="k" x="310" y="122">MANAGED AGENT SESSION</text><text class="n" x="310" y="146">agent + environment + source file + outcome loop</text>
  <rect class="agent" x="310" y="170" width="410" height="290" rx="22"/><use href="#bot" class="icon" x="332" y="192" width="27" height="27"/><text class="k" x="371" y="209">AGENT</text><text class="l" x="332" y="245">Meeting Action Planner</text><text class="n" x="332" y="270">source-grounded operations lead</text><rect class="sub" x="332" y="296" width="366" height="72" rx="16"/><use href="#tool" class="icon" x="350" y="315" width="22" height="22"/><text class="k" x="382" y="331">BUILT-IN AGENT TOOLSET</text>
  <rect class="panel" x="752" y="170" width="352" height="290" rx="22"/><use href="#cloud" class="icon" x="774" y="192" width="25" height="25"/><text class="k" x="811" y="208">ENVIRONMENT</text><text class="l" x="774" y="245">Cloud runtime</text><rect class="sub" x="774" y="278" width="308" height="112" rx="15"/><use href="#network" class="icon" x="792" y="297" width="21" height="21"/><text class="k" x="824" y="313">NETWORK PERMISSIONS</text><text class="l" x="792" y="349">limited</text><text class="n" x="792" y="376">allowed_hosts: none</text><path class="dash" d="M720 315H752"/>
  <rect class="panel" x="310" y="488" width="384" height="190" rx="20"/><use href="#file" class="icon" x="332" y="510" width="23" height="23"/><text class="k" x="369" y="527">SESSION RESOURCE · FILE</text><text class="l" x="332" y="565">meeting_notes.md</text><text class="n" x="332" y="593">mounted at /workspace/meeting_notes.md</text><text class="n" x="332" y="623">fixed source for the plan</text>
  <rect class="accent" x="720" y="488" width="384" height="190" rx="20"/><use href="#check" class="icon" x="742" y="510" width="23" height="23"/><text class="k" x="779" y="527">OUTCOME EVENT + MANAGED GRADER</text><text class="l" x="742" y="565">Text rubric</text><text class="n" x="742" y="593">max_iterations: 3</text><text class="n" x="742" y="621">satisfied or needs_revision</text><path class="loop" d="M742 646C690 708 590 706 560 660"/>
  <rect class="panel" x="1170" y="344" width="194" height="142" rx="18"/><use href="#file" class="icon" x="1189" y="365" width="24" height="24"/><text class="k" x="1224" y="382">RESULT</text><text class="l" x="1189" y="422">action_plan.md</text><text class="n" x="1189" y="450">Files API download</text><path class="line" d="M1136 415H1170"/>
</svg>
