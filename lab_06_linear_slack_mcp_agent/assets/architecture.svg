<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="790" viewBox="0 0 1480 790" role="img" aria-labelledby="title desc">
  <title id="title">Lab 6 — Linear and optional Slack MCP agent</title><desc id="desc">The Linear Triage Agent owns built-in, Linear MCP, and optional Slack MCP toolsets. Linear tool permission is always allow. The session carries vault IDs. Its environment owns limited networking that permits MCP servers. Linear and Slack remain separate external MCP servers.</desc>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#4f7cff"/></marker><symbol id="msg" viewBox="0 0 24 24"><path d="M22 17a2 2 0 0 1-2 2H7l-5 3V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"/></symbol><symbol id="bot" viewBox="0 0 24 24"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2m16 0h2M9 13v2m6-2v2"/></symbol><symbol id="cloud" viewBox="0 0 24 24"><path d="M17.5 19H9a7 7 0 1 1 6.7-9h1.8a4.5 4.5 0 1 1 0 9Z"/></symbol><symbol id="tool" viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5-5L7.5 3.5l3 3-4 4-3-3-2.2 2.2a4 4 0 0 0 5 5L16 24l8-8-9.3-9.7Z"/></symbol><symbol id="plug" viewBox="0 0 24 24"><path d="M12 22v-5M15 8V2M9 8V2"/><path d="M7 8h10a1 1 0 0 1 1 1v4a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1Z"/></symbol><symbol id="shield" viewBox="0 0 24 24"><path d="M20 13c0 5-3.5 7.5-8 9-4.5-1.5-8-4-8-9V5l8-3 8 3z"/><path d="m9 12 2 2 4-4"/></symbol><symbol id="network" viewBox="0 0 24 24"><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3h14v3M12 8v5"/></symbol><symbol id="key" viewBox="0 0 24 24"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6M15 8l3 3m-6-6 3 3"/></symbol><symbol id="safe" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M12 9V7m3 5h2m-5 3v2m-3-5H7"/></symbol></defs>
  <style>.bg{fill:#f7f9fc}.session{fill:#fbfdff;stroke:#4f7cff;stroke-width:2.5}.panel{fill:#fff;stroke:#d6e1ec;stroke-width:2}.agent{fill:#eef4ff;stroke:#7aa0ff;stroke-width:2}.sub{fill:#fff;stroke:#bfd0e3;stroke-width:1.7}.accent{fill:#eef4ff;stroke:#4f7cff;stroke-width:1.8}.line{fill:none;stroke:#4f7cff;stroke-width:2.3;marker-end:url(#a)}.dash{fill:none;stroke:#7d91a6;stroke-width:2;stroke-dasharray:6 6}.h{font:700 25px system-ui,sans-serif;fill:#17324d}.k{font:700 12px system-ui,sans-serif;letter-spacing:.09em;fill:#60758a}.l{font:650 17px system-ui,sans-serif;fill:#17324d}.n{font:14px system-ui,sans-serif;fill:#60758a}.s{font:13px system-ui,sans-serif;fill:#60758a}.icon{fill:none;stroke:#4f7cff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}</style>
  <rect class="bg" x="4" y="4" width="1472" height="782" rx="28"/><text class="h" x="42" y="52">Linear + Slack MCP agent with vault credentials</text>
  <rect class="panel" x="40" y="126" width="200" height="126" rx="18"/><use href="#msg" class="icon" x="58" y="147" width="24" height="24"/><text class="k" x="94" y="163">USER PROMPT</text><text class="l" x="58" y="201">Triage + file bug</text><text class="n" x="58" y="228">Slack only if requested</text><path class="line" d="M240 190H276"/>
  <rect class="session" x="276" y="88" width="858" height="642" rx="28"/><text class="k" x="308" y="122">MANAGED AGENT SESSION</text><text class="n" x="308" y="146">agent version + environment + vault-backed MCP authentication</text>
  <rect class="agent" x="308" y="170" width="438" height="514" rx="22"/><use href="#bot" class="icon" x="330" y="192" width="27" height="27"/><text class="k" x="369" y="209">AGENT</text><text class="l" x="330" y="245">Linear Triage Agent</text><text class="n" x="330" y="270">Claude Haiku · triage instructions</text>
  <rect class="sub" x="330" y="292" width="394" height="62" rx="14"/><use href="#tool" class="icon" x="348" y="311" width="21" height="21"/><text class="k" x="380" y="327">BUILT-IN AGENT TOOLSET</text>
  <rect class="sub" x="330" y="386" width="394" height="132" rx="14"/><use href="#plug" class="icon" x="348" y="405" width="21" height="21"/><text class="k" x="380" y="421">LINEAR MCP TOOLSET</text><text class="l" x="348" y="454">list · triage · create issue</text><rect class="accent" x="348" y="470" width="358" height="34" rx="10"/><use href="#shield" class="icon" x="360" y="477" width="18" height="18"/><text class="s" x="390" y="492">tool permission: always_allow</text>
  <rect class="sub" x="330" y="534" width="394" height="110" rx="14"/><use href="#plug" class="icon" x="348" y="553" width="21" height="21"/><text class="k" x="380" y="569">OPTIONAL SLACK MCP TOOLSET</text><text class="l" x="348" y="604">Slack context + posting</text><text class="n" x="348" y="628">default permission policy</text>
  <rect class="panel" x="776" y="170" width="328" height="262" rx="22"/><use href="#cloud" class="icon" x="798" y="192" width="25" height="25"/><text class="k" x="835" y="208">ENVIRONMENT</text><text class="l" x="798" y="245">Cloud runtime</text><rect class="sub" x="798" y="272" width="284" height="126" rx="15"/><use href="#network" class="icon" x="816" y="291" width="21" height="21"/><text class="k" x="848" y="307">NETWORK PERMISSIONS</text><text class="l" x="816" y="341">limited</text><text class="n" x="816" y="367">allow_mcp_servers: true</text><text class="n" x="816" y="390">allowed_hosts: none</text><path class="dash" d="M746 300H776"/>
  <rect class="panel" x="776" y="456" width="328" height="188" rx="20"/><use href="#safe" class="icon" x="798" y="478" width="23" height="23"/><text class="k" x="835" y="495">SESSION VAULT IDS</text><text class="l" x="798" y="532">Linear credential</text><text class="n" x="798" y="558">Slack credential (optional)</text><text class="n" x="798" y="594">auth is attached to the session,</text><text class="n" x="798" y="616">not stored on the agent</text>
  <rect class="panel" x="1180" y="144" width="250" height="108" rx="18"/><use href="#plug" class="icon" x="1200" y="165" width="23" height="23"/><text class="k" x="1235" y="181">MCP SERVER</text><text class="l" x="1200" y="218">Linear</text><path class="line" d="M724 452H752V704H1148V198H1180"/>
  <rect class="panel" x="1180" y="286" width="250" height="108" rx="18"/><use href="#plug" class="icon" x="1200" y="307" width="23" height="23"/><text class="k" x="1235" y="323">OPTIONAL MCP SERVER</text><text class="l" x="1200" y="360">Slack</text><path class="line" d="M724 588H762V716H1160V340H1180"/>
  <rect class="panel" x="40" y="474" width="200" height="126" rx="18"/><text class="k" x="60" y="501">RESULT</text><text class="l" x="60" y="538">Priority triage</text><text class="n" x="60" y="564">new Linear issue ID</text><path class="line" d="M276 537H250"/>
</svg>
