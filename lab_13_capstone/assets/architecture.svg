  <rect class="panel" x="40" y="126" width="210" height="148" rx="18"/><use href="#msg" class="icon" x="58" y="147" width="24" height="24"/><text class="k" x="94" y="163">USER-DEFINED OUTCOME</text><text class="l" x="58" y="201">Research topic</text><text class="n" x="58" y="228">rubric + max 8 iterations</text><text class="n" x="58" y="252">Google Doc + Slack updates</text><path class="line" d="M250 200H284"/>
  <rect class="session" x="284" y="88" width="1160" height="902" rx="28"/><text class="k" x="316" y="122">MANAGED AGENT SESSION</text><text class="n" x="316" y="146">coordinator + specialists + environment + memory attachments + vaults + outcome loop</text>
  <rect class="agent" x="316" y="170" width="722" height="560" rx="22"/><use href="#bot" class="icon" x="338" y="192" width="27" height="27"/><text class="k" x="377" y="209">COORDINATOR AGENT</text><text class="l" x="338" y="245">Capstone Research Lead</text><text class="n" x="338" y="270">coordinates handoffs, filing, and status updates</text>
  <rect class="sub" x="338" y="294" width="678" height="124" rx="14"/><use href="#tool" class="icon" x="356" y="313" width="21" height="21"/><text class="k" x="388" y="329">BUILT-IN AGENT TOOLSET</text><use href="#plug" class="icon" x="680" y="313" width="21" height="21"/><text class="k" x="712" y="329">MCP TOOLSETS · GOOGLE DOCS + SLACK</text><rect class="accent" x="680" y="350" width="318" height="56" rx="9"/><use href="#shield" class="icon" x="694" y="369" width="17" height="17"/><text class="s" x="721" y="382">Slack permission: always_allow</text>
  <rect class="sub" x="338" y="438" width="678" height="260" rx="16"/><use href="#users" class="icon" x="356" y="457" width="23" height="23"/><text class="k" x="391" y="474">MULTIAGENT ROSTER · SPECIALIST AGENTS</text><rect class="role" x="356" y="500" width="198" height="168" rx="14"/><text class="l" x="372" y="531">Researcher</text><text class="s" x="372" y="557">scoped tools</text><text class="n" x="372" y="583">web_search · web_fetch</text><text class="n" x="372" y="608">read · write</text><text class="s" x="372" y="642">→ citations.json</text><rect class="role" x="568" y="500" width="198" height="168" rx="14"/><text class="l" x="584" y="531">Writer</text><text class="s" x="584" y="557">Built-In Agent Toolset</text><text class="s" x="584" y="642">→ draft.md</text><rect class="role" x="780" y="500" width="218" height="168" rx="14"/><text class="l" x="796" y="531">Fact-Checker</text><text class="s" x="796" y="557">scoped tools</text><text class="n" x="796" y="583">web_fetch · read · write</text><text class="s" x="796" y="642">→ check.md</text>
  <rect class="panel" x="1068" y="170" width="344" height="326" rx="22"/><use href="#cloud" class="icon" x="1090" y="192" width="25" height="25"/><text class="k" x="1127" y="208">ENVIRONMENT</text><text class="l" x="1090" y="245">Shared cloud runtime</text><rect class="sub" x="1090" y="272" width="300" height="80" rx="14"/><use href="#pkg" class="icon" x="1108" y="291" width="21" height="21"/><text class="k" x="1140" y="307">PACKAGES</text><text class="n" x="1108" y="338">beautifulsoup4 · markdownify</text><rect class="sub" x="1090" y="368" width="300" height="104" rx="14"/><use href="#network" class="icon" x="1108" y="387" width="21" height="21"/><text class="k" x="1140" y="403">NETWORK PERMISSIONS</text><text class="l" x="1108" y="437">limited</text><text class="n" x="1108" y="461">Google hosts · MCP · packages</text><path class="dash" d="M1038 333H1068"/>
