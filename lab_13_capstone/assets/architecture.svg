l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></symbol><symbol id="file" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6M8 13h8m-8 4h8"/></symbol></defs>
  <style>.bg{fill:#f7f9fc}.session{fill:#fbfdff;stroke:#4f7cff;stroke-width:2.5}.panel{fill:#fff;stroke:#d6e1ec;stroke-width:2}.agent{fill:#eef4ff;stroke:#7aa0ff;stroke-width:2}.sub{fill:#fff;stroke:#bfd0e3;stroke-width:1.7}.role{fill:#f8fbff;stroke:#9db8d6;stroke-width:1.7}.rw{fill:#eef8f3;stroke:#78b89a;stroke-width:1.8}.ro{fill:#f5f2fb;stroke:#9b8bc4;stroke-width:1.8}.accent{fill:#fff8eb;stroke:#e7b453;stroke-width:1.8}.line{fill:none;stroke:#4f7cff;stroke-width:2.3;marker-end:url(#a)}.dash{fill:none;stroke:#7d91a6;stroke-width:2;stroke-dasharray:6 6}.h{font:700 25px system-ui,sans-serif;fill:#17324d}.k{font:700 12px system-ui,sans-serif;letter-spacing:.09em;fill:#60758a}.l{font:650 17px system-ui,sans-serif;fill:#17324d}.n{font:14px system-ui,sans-serif;fill:#60758a}.s{font:13px system-ui,sans-serif;fill:#60758a}.icon{fill:none;stroke:#4f7cff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}</style>
