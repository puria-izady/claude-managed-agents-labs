<svg xmlns="http://www.w3.org/2000/svg" width="1740" height="1040" viewBox="0 0 1740 1040" role="img" aria-labelledby="title desc">
  <title id="title">Lab 13 — Personal Research Agent capstone</title><desc id="desc">A user-defined outcome enters a Managed Agent session containing a Research Lead coordinator, specialist roster, and cloud environment. Tools and permissions belong to their agents. Packages and networking belong to the environment. Read-only and read-write memory stores plus vault IDs are session resources and configuration. Google Docs and Slack are separate external MCP servers.</desc>
