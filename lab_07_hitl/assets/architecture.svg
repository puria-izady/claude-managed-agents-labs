<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Lab 7 — Human-in-the-loop tool permissions</title><desc id="desc">A coding prompt enters a session containing a HITL Coding Assistant and cloud environment. Tool permissions are nested under the agent toolset: the default allows tools, while selected mutating tools ask for confirmation. Requires-action events are answered by operator confirmation.</desc>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#4f7cff"/></marker><marker id="black-arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#17324d"/></marker><marker id="black-arrow-start" markerWidth="9" markerHeight="9" refX="1" refY="4.5" orient="auto"><path d="M9 0 0 4.5 9 9Z" fill="#17324d"/></marker><symbol id="msg" viewBox="0 0 24 24"><path d="M22 17a2 2 0 0 1-2 2H7l-5 3V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"/></symbol><symbol id="bot" viewBox="0 0 24 24"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2m16 0h2M9 13v2m6-2v2"/></symbol><symbol id="cloud" viewBox="0 0 24 24"><path d="M17.5 19H9a7 7 0 1 1 6.7-9h1.8a4.5 4.5 0 1 1 0 9Z"/></symbol><symbol id="tool" viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5-5L7.5 3.5l3 3-4 4-3-3-2.2 2.2a4 4 0 0 0 5 5L16 24l8-8-9.3-9.7Z"/></symbol><symbol id="shield" viewBox="0 0 24 24"><path d="M20 13c0 5-3.5 7.5-8 9-4.5-1.5-8-4-8-9V5l8-3 8 3z"/><path d="m9 12 2 2 4-4"/></symbol><symbol id="user" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M4 22a8 8 0 0 1 16 0"/></symbol><symbol id="network" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></symbol><symbol id="file" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></symbol></defs>
  <style>.bg{fill:#f7f9fc}.session{fill:#fbfdff;stroke:#4f7cff;stroke-width:2.5}.panel{fill:#fff;stroke:#d6e1ec;stroke-width:2}.agent{fill:#eef4ff;stroke:#7aa0ff;stroke-width:2}.sub{fill:#fff;stroke:#bfd0e3;stroke-width:1.7}.accent{fill:#fff8eb;stroke:#e7b453;stroke-width:1.8}.line{fill:none;stroke:#4f7cff;stroke-width:2.3;marker-end:url(#a)}.approval{fill:none;stroke:#17324d;stroke-width:2.3;marker-start:url(#black-arrow-start);marker-end:url(#black-arrow)}.dash{fill:none;stroke:#7d91a6;stroke-width:2;stroke-dasharray:6 6}.h{font:700 25px system-ui,sans-serif;fill:#17324d}.k{font:700 12px system-ui,sans-serif;letter-spacing:.09em;fill:#60758a}.l{font:650 17px system-ui,sans-serif;fill:#17324d}.n{font:14px system-ui,sans-serif;fill:#60758a}.s{font:13px system-ui,sans-serif;fill:#60758a}.icon{fill:none;stroke:#4f7cff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}</style>
  <rect class="bg" x="4" y="4" width="1392" height="752" rx="28"/><text class="h" x="42" y="52">Human-in-the-loop tool permissions</text>
  <rect class="panel" x="40" y="122" width="200" height="132" rx="18"/><use href="#msg" class="icon" x="58" y="143" width="24" height="24"/><text class="k" x="94" y="159">USER PROMPT</text><text class="l" x="58" y="197">Write + run script</text><text class="n" x="58" y="225">/workspace/hello.py</text><path class="line" d="M240 188H278"/>
  <rect class="session" x="278" y="88" width="858" height="610" rx="28"/><text class="k" x="310" y="122">MANAGED AGENT SESSION</text><text class="n" x="310" y="146">pauses on permission-gated tool calls</text>
  <rect class="agent" x="310" y="170" width="438" height="484" rx="22"/><use href="#bot" class="icon" x="332" y="192" width="27" height="27"/><text class="k" x="371" y="209">AGENT</text><text class="l" x="332" y="245">HITL Coding Assistant</text><text class="n" x="332" y="270">careful, one action at a time</text><rect class="sub" x="332" y="294" width="394" height="316" rx="16"/><use href="#tool" class="icon" x="350" y="313" width="22" height="22"/><text class="k" x="382" y="329">BUILT-IN AGENT TOOLSET</text><rect class="sub" x="350" y="354" width="358" height="72" rx="12"/><use href="#shield" class="icon" x="366" y="374" width="20" height="20"/><text class="k" x="398" y="385">DEFAULT TOOL PERMISSION</text><text class="n" x="398" y="410">always_allow</text><rect class="accent" x="350" y="444" width="358" height="132" rx="12"/><use href="#shield" class="icon" x="366" y="464" width="20" height="20"/><text class="k" x="398" y="475">SELECTED TOOL OVERRIDES</text><text class="l" x="366" y="512">Mutating tools</text><text class="n" x="366" y="544">always_ask</text>
  <rect class="panel" x="778" y="170" width="326" height="248" rx="22"/><use href="#cloud" class="icon" x="800" y="192" width="25" height="25"/><text class="k" x="837" y="208">ENVIRONMENT</text><text class="l" x="800" y="247">Cloud runtime</text><rect class="sub" x="800" y="276" width="282" height="100" rx="15"/><use href="#network" class="icon" x="818" y="295" width="21" height="21"/><text class="k" x="850" y="311">NETWORK PERMISSIONS</text><text class="l" x="818" y="348">unrestricted</text><path class="dash" d="M748 294H778"/>
  <rect class="panel" x="778" y="446" width="326" height="164" rx="20"/><text class="k" x="800" y="474">SESSION CONTROL EVENTS</text><text class="l" x="800" y="509">requires_action</text><text class="n" x="800" y="538">user.tool_confirmation</text><text class="n" x="800" y="566">allow or deny + reason</text>
  <rect class="panel" x="1170" y="210" width="194" height="136" rx="18"/><use href="#user" class="icon" x="1189" y="231" width="24" height="24"/><text class="k" x="1224" y="248">OPERATOR</text><text class="l" x="1189" y="286">Approve / deny</text><text class="n" x="1189" y="314">each gated call</text><path class="approval" d="M1104 500H1140V390H1267V346"/>
  <rect class="panel" x="1170" y="446" width="194" height="116" rx="18"/><use href="#file" class="icon" x="1189" y="467" width="24" height="24"/><text class="k" x="1224" y="484">RESULT</text><text class="l" x="1189" y="521">hello.py</text><text class="n" x="1189" y="546">written and run</text>
</svg>
