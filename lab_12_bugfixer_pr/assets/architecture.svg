<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820" role="img" aria-labelledby="title desc">
  <title id="title">Lab 12 — Bug fixer with a GitHub repository resource and MCP</title><desc id="desc">The Bug Fixer agent owns local tools and a GitHub MCP toolset. The session attaches a GitHub repository resource and a GitHub vault credential. The environment owns pytest and restricted GitHub networking. The external GitHub MCP server creates the branch, commit, and pull request.</desc>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#4f7cff"/></marker><symbol id="msg" viewBox="0 0 24 24"><path d="M22 17a2 2 0 0 1-2 2H7l-5 3V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"/></symbol><symbol id="bot" viewBox="0 0 24 24"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2m16 0h2M9 13v2m6-2v2"/></symbol><symbol id="cloud" viewBox="0 0 24 24"><path d="M17.5 19H9a7 7 0 1 1 6.7-9h1.8a4.5 4.5 0 1 1 0 9Z"/></symbol><symbol id="tool" viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5-5L7.5 3.5l3 3-4 4-3-3-2.2 2.2a4 4 0 0 0 5 5L16 24l8-8-9.3-9.7Z"/></symbol><symbol id="plug" viewBox="0 0 24 24"><path d="M12 22v-5M15 8V2M9 8V2"/><path d="M7 8h10a1 1 0 0 1 1 1v4a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1Z"/></symbol><symbol id="pkg" viewBox="0 0 24 24"><path d="M3 7l9 5 9-5M3 17l9 5 9-5V7l-9-5-9 5Z"/><path d="M12 12v10"/></symbol><symbol id="network" viewBox="0 0 24 24"><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3h14v3M12 8v5"/></symbol><symbol id="github" viewBox="0 0 24 24"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3.3-.4 6.8-1.6 6.8-7A5.4 5.4 0 0 0 19.3 4 5 5 0 0 0 19.2.5S18 0 15 2a13.4 13.4 0 0 0-7 0C5 0 3.8.5 3.8.5A5 5 0 0 0 3.7 4a5.4 5.4 0 0 0-1.5 3.7c0 5.4 3.5 6.5 6.8 7A4.8 4.8 0 0 0 8 18v4"/><path d="M8 19c-3 .9-3-1.5-4-2"/></symbol><symbol id="key" viewBox="0 0 24 24"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6M15 8l3 3m-6-6 3 3"/></symbol><symbol id="safe" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M12 9V7m3 5h2m-5 3v2m-3-5H7"/></symbol></defs>
  <style>.bg{fill:#f7f9fc}.session{fill:#fbfdff;stroke:#4f7cff;stroke-width:2.5}.panel{fill:#fff;stroke:#d6e1ec;stroke-width:2}.agent{fill:#eef4ff;stroke:#7aa0ff;stroke-width:2}.sub{fill:#fff;stroke:#bfd0e3;stroke-width:1.7}.resource{fill:#eef8f3;stroke:#78b89a;stroke-width:1.8}.line{fill:none;stroke:#4f7cff;stroke-width:2.3;marker-end:url(#a)}.dash{fill:none;stroke:#7d91a6;stroke-width:2;stroke-dasharray:6 6}.h{font:700 25px system-ui,sans-serif;fill:#17324d}.k{font:700 12px system-ui,sans-serif;letter-spacing:.09em;fill:#60758a}.l{font:650 17px system-ui,sans-serif;fill:#17324d}.n{font:14px system-ui,sans-serif;fill:#60758a}.s{font:13px system-ui,sans-serif;fill:#60758a}.icon{fill:none;stroke:#4f7cff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}</style>
  <rect class="bg" x="4" y="4" width="1492" height="812" rx="28"/><text class="h" x="42" y="52">Bug fixer with a mounted GitHub repository and GitHub MCP</text>
  <rect class="panel" x="40" y="126" width="200" height="130" rx="18"/><use href="#msg" class="icon" x="58" y="147" width="24" height="24"/><text class="k" x="94" y="163">USER PROMPT</text><text class="l" x="58" y="201">Fix failing test</text><text class="n" x="58" y="229">then open a PR</text><path class="line" d="M240 191H278"/>
  <rect class="session" x="278" y="88" width="858" height="682" rx="28"/><text class="k" x="310" y="122">MANAGED AGENT SESSION</text><text class="n" x="310" y="146">agent + environment + repository mount + GitHub vault</text>
  <rect class="agent" x="310" y="170" width="426" height="382" rx="22"/><use href="#bot" class="icon" x="332" y="192" width="27" height="27"/><text class="k" x="371" y="209">AGENT</text><text class="l" x="332" y="245">Bug Fixer</text><text class="n" x="332" y="270">reproduce · edit · retest · create PR</text><rect class="sub" x="332" y="294" width="382" height="62" rx="14"/><use href="#tool" class="icon" x="350" y="313" width="21" height="21"/><text class="k" x="382" y="329">BUILT-IN AGENT TOOLSET</text><rect class="sub" x="332" y="414" width="382" height="104" rx="14"/><use href="#plug" class="icon" x="350" y="433" width="21" height="21"/><text class="k" x="382" y="449">GITHUB MCP TOOLSET</text><text class="l" x="350" y="485">branch · commit · pull request</text><text class="n" x="350" y="508">no local git push</text>
  <rect class="panel" x="766" y="170" width="338" height="382" rx="22"/><use href="#cloud" class="icon" x="788" y="192" width="25" height="25"/><text class="k" x="825" y="208">ENVIRONMENT</text><text class="l" x="788" y="245">Cloud runtime</text><rect class="sub" x="788" y="270" width="294" height="80" rx="14"/><use href="#pkg" class="icon" x="806" y="289" width="21" height="21"/><text class="k" x="838" y="305">PACKAGE</text><text class="n" x="806" y="335">pytest</text><rect class="sub" x="788" y="366" width="294" height="152" rx="14"/><use href="#network" class="icon" x="806" y="385" width="21" height="21"/><text class="k" x="838" y="401">NETWORK PERMISSIONS</text><text class="l" x="806" y="436">limited</text><text class="n" x="806" y="462">api.github.com · github.com</text><text class="n" x="806" y="486">MCP + package managers allowed</text><path class="dash" d="M736 360H766"/>
  <rect class="resource" x="310" y="580" width="500" height="146" rx="20"/><use href="#github" class="icon" x="332" y="602" width="24" height="24"/><text class="k" x="369" y="619">SESSION RESOURCE · GITHUB REPOSITORY</text><text class="l" x="332" y="656">repo branch → /workspace/repo</text><text class="n" x="332" y="684">authorization token mounts the checkout</text>
  <rect class="panel" x="836" y="580" width="268" height="146" rx="20"/><use href="#safe" class="icon" x="858" y="602" width="24" height="24"/><text class="k" x="895" y="619">SESSION VAULT ID</text><text class="l" x="858" y="656">GitHub MCP credential</text><text class="n" x="858" y="684">server-side authentication</text>
  <rect class="panel" x="1180" y="184" width="270" height="122" rx="18"/><use href="#plug" class="icon" x="1200" y="205" width="24" height="24"/><text class="k" x="1235" y="222">MCP SERVER</text><text class="l" x="1200" y="260">GitHub</text><text class="n" x="1200" y="286">vault-backed access</text><path class="line" d="M714 466H750V744H1154V245H1180"/>
  <rect class="panel" x="40" y="410" width="200" height="142" rx="18"/><use href="#github" class="icon" x="58" y="431" width="24" height="24"/><text class="k" x="95" y="448">RESULT</text><text class="l" x="58" y="486">GitHub pull request</text><text class="n" x="58" y="514">branch + commit + PR URL</text><path class="line" d="M278 481H240"/>
</svg>
