<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Lab 5 — Streaming agent sessions</title><desc id="desc">Repeated user messages enter one persistent Managed Agent session. The session contains a Streaming Console agent and an unrestricted cloud environment. Agent messages and tool-use events stream back, while cumulative session usage feeds the cost meter.</desc>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#4f7cff"/></marker><symbol id="msg" viewBox="0 0 24 24"><path d="M22 17a2 2 0 0 1-2 2H7l-5 3V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"/></symbol><symbol id="bot" viewBox="0 0 24 24"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2m16 0h2M9 13v2m6-2v2"/></symbol><symbol id="cloud" viewBox="0 0 24 24"><path d="M17.5 19H9a7 7 0 1 1 6.7-9h1.8a4.5 4.5 0 1 1 0 9Z"/></symbol><symbol id="tool" viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5-5L7.5 3.5l3 3-4 4-3-3-2.2 2.2a4 4 0 0 0 5 5L16 24l8-8-9.3-9.7Z"/></symbol><symbol id="network" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></symbol><symbol id="stream" viewBox="0 0 24 24"><path d="M4 6h16M4 12h10M4 18h16"/><path d="m17 9 3 3-3 3"/></symbol><symbol id="chart" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="m7 16 4-5 4 3 5-7"/></symbol></defs>
  <style>.bg{fill:#f7f9fc}.session{fill:#fbfdff;stroke:#4f7cff;stroke-width:2.5}.panel{fill:#fff;stroke:#d6e1ec;stroke-width:2}.agent{fill:#eef4ff;stroke:#7aa0ff;stroke-width:2}.sub{fill:#fff;stroke:#bfd0e3;stroke-width:1.7}.line{fill:none;stroke:#4f7cff;stroke-width:2.3;marker-end:url(#a)}.dash{fill:none;stroke:#7d91a6;stroke-width:2;stroke-dasharray:6 6}.h{font:700 25px system-ui,sans-serif;fill:#17324d}.k{font:700 12px system-ui,sans-serif;letter-spacing:.09em;fill:#60758a}.l{font:650 17px system-ui,sans-serif;fill:#17324d}.n{font:14px system-ui,sans-serif;fill:#60758a}.icon{fill:none;stroke:#4f7cff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}</style>
  <rect class="bg" x="4" y="4" width="1392" height="752" rx="28"/><text class="h" x="42" y="52">Streaming agent sessions</text>
  <rect class="panel" x="40" y="130" width="200" height="132" rx="18"/><use href="#msg" class="icon" x="58" y="150" width="24" height="24"/><text class="k" x="94" y="166">USER EVENTS</text><text class="l" x="58" y="204">user.message</text><text class="n" x="58" y="231">or user.interrupt</text><path class="line" d="M240 196H278"/>
  <rect class="session" x="278" y="88" width="858" height="610" rx="28"/><text class="k" x="310" y="122">PERSISTENT MANAGED AGENT SESSION</text><text class="n" x="310" y="146">one session preserves state across repeated turns</text>
  <rect class="agent" x="310" y="172" width="410" height="320" rx="22"/><use href="#bot" class="icon" x="332" y="194" width="27" height="27"/><text class="k" x="371" y="211">AGENT</text><text class="l" x="332" y="248">Streaming Console</text><text class="n" x="332" y="272">Claude model · concise console system prompt</text><rect class="sub" x="332" y="300" width="366" height="72" rx="16"/><use href="#tool" class="icon" x="350" y="319" width="22" height="22"/><text class="k" x="382" y="335">BUILT-IN AGENT TOOLSET</text>
  <rect class="panel" x="752" y="172" width="352" height="320" rx="22"/><use href="#cloud" class="icon" x="774" y="194" width="25" height="25"/><text class="k" x="811" y="210">ENVIRONMENT</text><text class="l" x="774" y="247">Cloud runtime</text><rect class="sub" x="774" y="282" width="308" height="104" rx="15"/><use href="#network" class="icon" x="792" y="302" width="22" height="22"/><text class="k" x="824" y="318">NETWORK PERMISSIONS</text><text class="l" x="792" y="354">unrestricted</text><path class="dash" d="M720 332H752"/>
  <rect class="panel" x="310" y="522" width="380" height="132" rx="20"/><use href="#stream" class="icon" x="332" y="544" width="23" height="23"/><text class="k" x="369" y="561">EVENT STREAM</text><text class="l" x="332" y="596">message · tool_use · status_idle</text><text class="n" x="332" y="624">idle marks the end of each turn</text>
  <rect class="panel" x="720" y="522" width="384" height="132" rx="20"/><use href="#chart" class="icon" x="742" y="544" width="23" height="23"/><text class="k" x="779" y="561">CUMULATIVE SESSION USAGE</text><text class="l" x="742" y="596">input · cache · output tokens</text><text class="n" x="742" y="624">cost meter refreshes after idle</text>
  <rect class="panel" x="1170" y="230" width="194" height="126" rx="18"/><use href="#stream" class="icon" x="1189" y="251" width="24" height="24"/><text class="k" x="1224" y="268">LIVE RESULT</text><text class="l" x="1189" y="305">Agent response</text><text class="n" x="1189" y="332">plus running cost</text><path class="line" d="M1136 293H1170"/>
</svg>
